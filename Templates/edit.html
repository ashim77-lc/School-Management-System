<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Student</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
    <h1 class="mb-4">Edit {{ student["name"] }}</h1>
    
    <div class="card p-4">
        <form action="/update/{{ student['id'] }}" method="POST">
            <h5 class="mb-3">Update Subject Marks</h5>
            
            {% for i in range(subjects|length) %}
            <div class="row mb-2">
                <!-- hidden subject id -->
                <input type="hidden" name="subject_id_{{ i+1 }}" value="{{ subjects[i]['id'] }}">
                <div class="col-md-6">
                    <input type="text" class="form-control" value="{{ subjects[i]['subject_name'] }}" disabled>
                </div>
                <div class="col-md-6">
                    <input type="number" name="marks_{{ i+1 }}" class="form-control" value="{{ subjects[i]['marks'] }}" min="0" max="100">
                </div>
            </div>
            {% endfor %}

            <button type="submit" class="btn btn-success mt-3">Update</button>
            <a href="/" class="btn btn-secondary mt-3">Cancel</a>
        </form>
    </div>
</body>
</html>
