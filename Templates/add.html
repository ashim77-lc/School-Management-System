<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Student</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
    <h1 class="mb-4">Add New Student</h1>
    
    <div class="card p-4">
        <form action="/add" method="POST">
           
            <div class="mb-3">
                <label>Student Name</label>
                <input type="text" name="name" class="form-control" placeholder="Enter student name" required>
            </div>

            <h5 class="mt-4 mb-3">Subjects & Marks</h5>
            
            
            {% for i in range(1, 7) %}
            <div class="row mb-2">
                <div class="col-md-6">
                    <input type="text" name="subject_{{ i }}" class="form-control" placeholder="Subject {{ i }} name">
                </div>
                <div class="col-md-6">
                    <input type="number" name="marks_{{ i }}" class="form-control" placeholder="Marks (0-100)" min="0" max="100">
                </div>
            </div>
            {% endfor %}

            <button type="submit" class="btn btn-primary mt-3">Add Student</button>
            <a href="/" class="btn btn-secondary mt-3">Cancel</a>
        </form>
    </div>
</body>
</html>
