<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
    <h1 class="mb-4">🏫 School Management System</h1>
    
    <a href="/add" class="btn btn-primary mb-4">+ Add Student</a>
    <form action="/search" method="GET" class="row mb-4">
    <div class="col-md-8">
        <input type="text" name="q" class="form-control" placeholder="Search student by name..." value="{{ query if query }}">
    </div>
    <div class="col-md-2">
        <button type="submit" class="btn btn-success w-100">Search</button>
    </div>
    <div class="col-md-2">
        <a href="/" class="btn btn-secondary w-100">Clear</a>
    </div>
    </form>
    <table class="table table-bordered table-hover">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for student in students %}
            <tr>
                <td>{{ student["id"] }}</td>
                <td>{{ student["name"] }}</td>
                <td>
                    <a href="/student/{{ student['id'] }}" class="btn btn-info btn-sm">View</a>
                    <a href="/edit/{{ student['id'] }}" class="btn btn-warning btn-sm">Edit</a>
                    <a href="/delete/{{ student['id'] }}" class="btn btn-danger btn-sm">Delete</a>
                </td>
            </tr>
            {% else %}
                <tr>
                     <td colspan="3" class="text-center text-muted">No students found!</td>
                </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
